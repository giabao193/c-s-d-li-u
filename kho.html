<script>
  // 1. Khởi tạo dữ liệu và quyền
  document.querySelector("#user-info span span").innerText = user.tk;

  // 2. Kiểm tra quyền Admin
  if (user.quyen === "admin") {
    document.getElementById("vung-admin").style.display = "block";
    document.getElementById("cot-hanh-dong").style.display = "table-cell";
  }

  function hienThiKho() {
    fetch('/api/kho')
    .then(res => res.json())
    .then(duLieuKho => {
      let html = "";
      duLieuKho.forEach((item) => {
        // Khớp tên cột với SQL: ton_hien_tai, ten_nguyen_lieu, don_vi_tinh
        let ton = parseFloat(item.ton_hien_tai);
        let mucBaoDong = 10; // Giả sử mức báo động là 10
        
        let statusClass = ton >= mucBaoDong ? "safe" : "warning";
        let statusText = ton >= mucBaoDong ? "An toàn" : "Cần nhập gấp";

        html += `<tr>
                  <td><b>${item.nguyen_lieu_id}</b></td>
                  <td>${item.ten_nguyen_lieu}</td>
                  <td><b style="color:${ton < mucBaoDong ? "red" : "black"}">${ton} ${item.don_vi_tinh}</b></td>
                  <td>${mucBaoDong}</td>
                  <td><span class="status ${statusClass}">${statusText}</span></td>
                  ${user.quyen === "admin" ? `<td><button class="btn-delete-row" onclick="xoaDong('${item.nguyen_lieu_id}')">Xóa</button></td>` : ""}
              </tr>`;
      });
      document.getElementById("ds-kho").innerHTML =
        html || '<tr><td colspan="6" style="text-align:center">Kho trống</td></tr>';
    });
  }

  function themHang() {
    // Lưu ý: Hệ thống mới dùng id_nl (ID nguyên liệu)
    let id_nl = document.getElementById("ma").value; // Nhập ID nguyên liệu
    let sl = parseFloat(document.getElementById("ton").value); // Nhập số lượng nhập

    if (!id_nl || isNaN(sl))
      return alert("Vui lòng nhập ID nguyên liệu và số lượng!");

    fetch('/api/kho/nhap', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id_nl: id_nl, sl: sl })
    })
    .then(res => res.json())
    .then(result => {
      if(result.success) {
        hienThiKho();
        document.getElementById("ma").value = "";
        document.getElementById("ton").value = "";
        alert("Nhập kho thành công!");
      } else {
        alert("Lỗi: " + result.error);
      }
    });
  }

  function dangXuat() {
    localStorage.removeItem("nguoiDungHienTai");
    window.location.href = "login.html";
  }

  function toggleSidebar() {
    let sb = document.getElementById("sidebar");
    sb.style.left = sb.style.left === "0px" ? "-280px" : "0px";
  }

  hienThiKho();
</script>
